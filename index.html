<!DOCTYPE html>
<html lang="he" dir="rtl" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ההכרזה האבודה</title>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&amp;family=Secular+One&amp;display=swap" rel="stylesheet">
  <style>
    /* -- BASE RESET & LAYOUT -- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; font-family: 'Frank Ruhl Libre', serif; overflow: hidden; }

    .app-root {
      height: 100%;
      width: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      background: #0a0e1a;
      color: #e8dcc8;
      position: relative;
    }

    /* -- ATMOSPHERIC BACKGROUND -- */
    .app-root::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(0,56,117,0.35) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(193,154,72,0.15) 0%, transparent 50%),
        repeating-linear-gradient(0deg, transparent, transparent 98px, rgba(193,154,72,0.03) 98px, rgba(193,154,72,0.03) 100px),
        repeating-linear-gradient(90deg, transparent, transparent 98px, rgba(193,154,72,0.03) 98px, rgba(193,154,72,0.03) 100px);
      pointer-events: none;
      z-index: 0;
    }

    /* -- PAPER TEXTURE OVERLAY -- */
    .app-root::after {
      content: '';
      position: fixed;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .content-layer { position: relative; z-index: 1; min-height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

    /* -- TYPOGRAPHY -- */
    .title-font { font-family: 'Secular One', sans-serif; }
    .body-font { font-family: 'Frank Ruhl Libre', serif; }

    /* -- COLOR SYSTEM -- */
    :root {
      --bg: #0a0e1a;
      --surface: #141a2e;
      --text: #e8dcc8;
      --primary: #003875;
      --accent: #c19a48;
    }

    /* -- STAR OF DAVID SVG DECORATION -- */
    .star-decoration {
      width: 48px; height: 48px; opacity: 0.6;
    }
    .star-decoration path { fill: none; stroke: var(--primary); stroke-width: 1.5; }

    /* -- TIMER -- */
    .timer-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 4px; z-index: 100;
      background: rgba(255,255,255,0.05);
    }
    .timer-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent), #e8b84a);
      transition: width 1s linear;
    }
    .timer-fill.danger { background: linear-gradient(90deg, #a83232, #e04040); }

    .timer-display {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      z-index: 101; font-family: 'Secular One', sans-serif;
      font-size: 14px; letter-spacing: 3px;
      padding: 6px 20px; border-radius: 20px;
      background: rgba(10,14,26,0.85); border: 1px solid rgba(193,154,72,0.3);
      backdrop-filter: blur(8px);
    }

    /* -- CARDS & PANELS -- */
    .game-card {
      background: var(--surface);
      border: 1px solid rgba(193,154,72,0.15);
      border-radius: 12px;
      padding: 40px;
      max-width: 620px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
    }

    /* -- BUTTONS -- */
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(135deg, var(--primary), #004a99);
      color: #fff; border: 1px solid rgba(193,154,72,0.3);
      padding: 14px 36px; border-radius: 8px; font-size: 18px;
      font-family: 'Secular One', sans-serif; cursor: pointer;
      transition: all 0.25s ease; letter-spacing: 0.5px;
    }
    .btn-primary:hover { background: linear-gradient(135deg, #004a99, #005cc0); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,56,117,0.4); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .btn-secondary {
      background: transparent; color: var(--accent); border: 1px solid rgba(193,154,72,0.3);
      padding: 10px 24px; border-radius: 8px; font-size: 15px;
      font-family: 'Frank Ruhl Libre', serif; cursor: pointer;
      transition: all 0.25s ease;
    }
    .btn-secondary:hover { background: rgba(193,154,72,0.1); border-color: var(--accent); }
    .btn-secondary:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* -- INPUT FIELDS -- */
    .game-input {
      width: 100%; padding: 14px 18px; font-size: 18px;
      font-family: 'Frank Ruhl Libre', serif;
      background: rgba(0,0,0,0.3); color: var(--text);
      border: 1px solid rgba(193,154,72,0.2); border-radius: 8px;
      transition: border-color 0.25s ease;
      direction: rtl;
    }
    .game-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(193,154,72,0.1); }
    .game-input::placeholder { color: rgba(232,220,200,0.3); }

    /* -- MORSE CODE TABLE -- */
    .morse-table {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 4px; font-size: 13px; direction: ltr; text-align: center;
      background: rgba(0,0,0,0.2); border-radius: 8px; padding: 12px;
    }
    .morse-cell {
      padding: 4px; border-radius: 4px; background: rgba(193,154,72,0.05);
      border: 1px solid rgba(193,154,72,0.08);
    }
    .morse-letter { font-weight: 700; color: var(--accent); }
    .morse-code { font-size: 11px; opacity: 0.7; letter-spacing: 1px; }

    /* -- CODE SNIPPET BLOCK -- */
    .code-block {
      background: #0d1117; border: 1px solid rgba(193,154,72,0.1);
      border-radius: 8px; padding: 20px; font-family: monospace;
      font-size: 15px; direction: ltr; text-align: left;
      line-height: 1.8; overflow-x: auto;
    }
    .code-keyword { color: #ff7b72; }
    .code-string { color: #a5d6ff; }
    .code-bracket { color: #c19a48; }
    .code-comment { color: #6e7681; font-style: italic; }

    /* -- FEEDBACK MESSAGES -- */
    .feedback {
      padding: 12px 18px; border-radius: 8px; font-size: 15px;
      margin-top: 16px; text-align: center;
      animation: fadeSlideIn 0.3s ease;
    }
    .feedback.success { background: rgba(40,167,69,0.15); border: 1px solid rgba(40,167,69,0.3); color: #5ce089; }
    .feedback.error { background: rgba(220,53,69,0.15); border: 1px solid rgba(220,53,69,0.3); color: #f07080; }
    .feedback.hint { background: rgba(193,154,72,0.1); border: 1px solid rgba(193,154,72,0.2); color: var(--accent); }

    /* -- PROGRESS DOTS -- */
    .progress-track { display: flex; gap: 8px; justify-content: center; margin-bottom: 28px; }
    .progress-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(193,154,72,0.15); border: 1px solid rgba(193,154,72,0.3);
      transition: all 0.4s ease;
    }
    .progress-dot.completed { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px rgba(193,154,72,0.4); }
    .progress-dot.active { border-color: var(--accent); box-shadow: 0 0 12px rgba(193,154,72,0.3); animation: pulse 2s infinite; }

    /* -- HINT TOGGLE -- */
    .hint-area { margin-top: 16px; }
    .hint-content {
      max-height: 0; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease;
      opacity: 0;
    }
    .hint-content.open { max-height: 500px; opacity: 1; }

    /* -- ANIMATIONS -- */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 4px rgba(193,154,72,0.2); }
      50% { box-shadow: 0 0 16px rgba(193,154,72,0.5); }
    }
    @keyframes unlockSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes celebrateIn {
      0% { opacity: 0; transform: scale(0.8) translateY(20px); }
      60% { transform: scale(1.02) translateY(-4px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .celebrate-in { animation: celebrateIn 0.8s ease forwards; }

    /* -- SAFE DOOR VISUAL -- */
    .safe-container {
      width: 120px; height: 120px; margin: 0 auto 24px;
      position: relative;
    }
    .safe-door {
      width: 100%; height: 100%;
      border: 3px solid var(--accent); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a2040, #0d1225);
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.5), 0 0 30px rgba(193,154,72,0.1);
      transition: all 0.6s ease;
    }
    .safe-door.unlocked {
      border-color: #5ce089; box-shadow: 0 0 40px rgba(92,224,137,0.3);
    }
    .safe-dial {
      width: 50px; height: 50px; border: 2px solid rgba(193,154,72,0.5);
      border-radius: 50%; position: relative;
    }
    .safe-dial::after {
      content: ''; position: absolute; top: 4px; left: 50%; width: 2px; height: 40%;
      background: var(--accent); transform: translateX(-50%);
      transform-origin: bottom center;
    }
    .safe-door.unlocked .safe-dial { animation: unlockSpin 0.6s ease; border-color: #5ce089; }
    .safe-door.unlocked .safe-dial::after { background: #5ce089; }

    /* -- LOCK INDICATORS -- */
    .locks { display: flex; gap: 12px; justify-content: center; margin: 20px 0; }
    .lock-icon {
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(193,154,72,0.2); border-radius: 6px;
      font-size: 18px; transition: all 0.4s ease;
      background: rgba(0,0,0,0.2);
    }
    .lock-icon.unlocked { border-color: #5ce089; background: rgba(92,224,137,0.1); }

    /* -- RESPONSIVE -- */
    @media (max-width: 640px) {
      .game-card { padding: 24px 18px; }
      .morse-table { grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); font-size: 11px; }
      .code-block { font-size: 13px; padding: 14px; }
    }

    /* Scrollbar styling */
    .app-root::-webkit-scrollbar { width: 6px; }
    .app-root::-webkit-scrollbar-track { background: transparent; }
    .app-root::-webkit-scrollbar-thumb { background: rgba(193,154,72,0.2); border-radius: 3px; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
